<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoResearch 实时监控中心</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ─── Reset & Variables ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #21262d;
  --border:     #30363d;
  --text:       #e6edf3;
  --muted:      #8b949e;
  --accent:     #58a6ff;
  --green:      #3fb950;
  --yellow:     #d29922;
  --red:        #f85149;
  --purple:     #bc8cff;
  --orange:     #ffa657;
  --radius:     10px;
  --shadow:     0 4px 24px rgba(0,0,0,.45);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ─── Layout ─── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.topbar .logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700; color: var(--accent);
}
.topbar .logo svg { width:28px; height:28px; }
.topbar .subtitle { color: var(--muted); font-size: 13px; }
.topbar .spacer { flex: 1; }
.topbar .status-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(63,185,80,.12); color: var(--green);
  border: 1px solid rgba(63,185,80,.3);
  padding: 4px 12px; border-radius: 20px; font-size: 12px;
}
.dot-blink {
  width:8px; height:8px; border-radius:50%; background:var(--green);
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.topbar .time-display { color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums; }

/* ─── Main Grid ─── */
.main { flex:1; display:grid; grid-template-columns:1fr 1fr 360px; grid-template-rows:auto 1fr; gap:12px; padding:12px; overflow:hidden; }

/* ─── Cards ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-title {
  font-size: 13px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size:11px; padding:1px 8px; border-radius:10px;
  font-weight:400; text-transform:none; letter-spacing:0;
}

/* ─── Stats Row (spans full width) ─── */
.stats-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 6px;
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--accent); }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
.stat-value { font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1; }
.stat-sub { font-size:11px; color:var(--muted); }
.c-accent { color:var(--accent); }
.c-green  { color:var(--green); }
.c-yellow { color:var(--yellow); }
.c-red    { color:var(--red); }
.c-purple { color:var(--purple); }
.c-orange { color:var(--orange); }

/* ─── Chart containers ─── */
.chart-wrap { flex:1; position:relative; min-height:0; }
canvas { width:100% !important; }

/* ─── Tasks Panel ─── */
.tasks-panel { grid-row: 2; overflow-y:auto; }
.task-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  transition: border-color .2s;
}
.task-item:hover { border-color: var(--accent); }
.task-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.task-name { font-weight:600; flex:1; font-size:13px; }
.task-strategy {
  font-size:10px; padding:2px 7px; border-radius:4px;
  background:rgba(88,166,255,.15); color:var(--accent);
  border:1px solid rgba(88,166,255,.3);
}
.status-badge {
  font-size:10px; padding:2px 8px; border-radius:4px;
  font-weight:600; letter-spacing:.03em;
}
.status-running  { background:rgba(63,185,80,.15);  color:var(--green);  border:1px solid rgba(63,185,80,.3);  }
.status-pending  { background:rgba(210,153,34,.15); color:var(--yellow); border:1px solid rgba(210,153,34,.3); }
.status-completed{ background:rgba(88,166,255,.15); color:var(--accent); border:1px solid rgba(88,166,255,.3); }
.status-failed   { background:rgba(248,81,73,.15);  color:var(--red);    border:1px solid rgba(248,81,73,.3);  }

.progress-bar-bg { background:var(--border); border-radius:4px; height:6px; overflow:hidden; margin-bottom:8px; }
.progress-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; background: linear-gradient(90deg, var(--accent), var(--purple)); }
.progress-bar-fill.done { background: linear-gradient(90deg, var(--green), #34d058); }

.task-meta { display:flex; gap:16px; font-size:11px; color:var(--muted); }
.task-meta span b { color:var(--text); }

/* ─── Log Panel ─── */
.log-panel { grid-row:2; display:flex; flex-direction:column; }
.log-stream {
  flex:1; overflow-y:auto; font-family:"JetBrains Mono","Fira Code",monospace;
  font-size:12px; line-height:1.6; color:var(--muted);
  background:var(--surface2); border-radius:6px; padding:10px;
}
.log-stream::-webkit-scrollbar { width:4px; }
.log-stream::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.log-entry { margin-bottom:2px; }
.log-time  { color:var(--accent); }
.log-start { color:var(--green); }
.log-done  { color:var(--purple); }
.log-iter  { color:var(--text); }

/* ─── Scrollbars ─── */
.tasks-panel::-webkit-scrollbar { width:4px; }
.tasks-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ─── Connection overlay ─── */
#conn-overlay {
  position:fixed; inset:0; background:rgba(13,17,23,.85);
  backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  z-index:999; flex-direction:column; gap:16px;
  transition:opacity .4s;
}
#conn-overlay.hidden { opacity:0; pointer-events:none; }
.spinner {
  width:40px; height:40px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
#conn-msg { color:var(--muted); font-size:14px; }
</style>
</head>
<body>

<div id="conn-overlay">
  <div class="spinner"></div>
  <div id="conn-msg">正在连接实时数据流...</div>
</div>

<div class="app">

  <!-- ─ TopBar ─ -->
  <div class="topbar">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="14" fill="rgba(88,166,255,.15)" stroke="#58a6ff" stroke-width="1.5"/>
        <path d="M10 22 L16 10 L22 22" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 18 H20" stroke="#bc8cff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="10" r="2" fill="#58a6ff"/>
      </svg>
      AutoResearch
    </div>
    <span class="subtitle">自动优化 · 实时监控中心</span>
    <div class="spacer"></div>
    <div class="status-pill">
      <div class="dot-blink"></div>
      <span id="engine-status">引擎运行中</span>
    </div>
    <div class="time-display" id="clock">--:--:--</div>
  </div>

  <!-- ─ Content ─ -->
  <div class="main">

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">运行任务</div>
        <div class="stat-value c-green" id="s-active">0</div>
        <div class="stat-sub">当前并发</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已完成</div>
        <div class="stat-value c-accent" id="s-completed">0</div>
        <div class="stat-sub">累计任务数</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">学习评分</div>
        <div class="stat-value c-purple" id="s-learning">50%</div>
        <div class="stat-sub">元学习能力</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">累计提升</div>
        <div class="stat-value c-yellow" id="s-improvement">0%</div>
        <div class="stat-sub">总体性能改善</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CPU 使用</div>
        <div class="stat-value c-orange" id="s-cpu">--</div>
        <div class="stat-sub">实时采样</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">内存使用</div>
        <div class="stat-value c-red" id="s-mem">--</div>
        <div class="stat-sub">实时采样</div>
      </div>
    </div>

    <!-- Chart: CPU/Memory -->
    <div class="card">
      <div class="card-title">系统资源 <span class="badge" id="cpu-live">CPU --</span></div>
      <div class="chart-wrap">
        <canvas id="resChart"></canvas>
      </div>
    </div>

    <!-- Chart: Learning Score -->
    <div class="card">
      <div class="card-title">性能趋势 <span class="badge" id="score-live">学习中...</span></div>
      <div class="chart-wrap">
        <canvas id="scoreChart"></canvas>
      </div>
    </div>

    <!-- Tasks List -->
    <div class="card tasks-panel">
      <div class="card-title">优化任务 <span class="badge" id="task-count">0</span></div>
      <div id="tasks-list"></div>
    </div>

    <!-- Log Stream -->
    <div class="card log-panel" style="grid-column:1/3;">
      <div class="card-title">实时日志流 <span class="badge" id="log-count">0 条</span></div>
      <div class="log-stream" id="log-stream"></div>
    </div>

    <!-- Mini Stats Chart -->
    <div class="card" style="grid-row:3;">
      <div class="card-title">任务统计 <span class="badge">策略分布</span></div>
      <div class="chart-wrap">
        <canvas id="stratChart"></canvas>
      </div>
    </div>

  </div>
</div>

<script>
// ─── Utilities ───────────────────────────────────────────────
const $ = id => document.getElementById(id);
function fmtScore(v) {
  if (v == null || v === -Infinity) return 'N/A';
  return typeof v === 'number' ? v.toFixed(4) : v;
}

// ─── Clock ───────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  $('clock').textContent = now.toLocaleTimeString('zh-CN', {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();

// ─── Chart.js defaults ───────────────────────────────────────
Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#30363d';
Chart.defaults.font.family = "'SF Pro Display','Segoe UI',system-ui,sans-serif";
Chart.defaults.font.size = 11;

const MAX_POINTS = 60;

function makeTimeLabels(n) {
  return Array(n).fill('');
}

// Resource Chart (CPU + Memory)
const resChart = new Chart($('resChart'), {
  type: 'line',
  data: {
    labels: makeTimeLabels(MAX_POINTS),
    datasets: [
      {
        label: 'CPU %', data: Array(MAX_POINTS).fill(null),
        borderColor: '#ffa657', backgroundColor: 'rgba(255,166,87,.08)',
        borderWidth: 1.5, tension: 0.4, fill: true, pointRadius: 0,
      },
      {
        label: '内存 %', data: Array(MAX_POINTS).fill(null),
        borderColor: '#f85149', backgroundColor: 'rgba(248,81,73,.08)',
        borderWidth: 1.5, tension: 0.4, fill: true, pointRadius: 0,
      }
    ]
  },
  options: {
    animation: false,
    responsive: true, maintainAspectRatio: false,
    scales: {
      x: { display: false },
      y: { min: 0, max: 100, grid: { color: '#21262d' },
           ticks: { callback: v => v + '%' } }
    },
    plugins: { legend: { position:'top', labels: { boxWidth:12, padding:12 } } }
  }
});

// Learning Score Chart
const scoreChart = new Chart($('scoreChart'), {
  type: 'line',
  data: {
    labels: makeTimeLabels(MAX_POINTS),
    datasets: [
      {
        label: '学习评分', data: Array(MAX_POINTS).fill(null),
        borderColor: '#bc8cff', backgroundColor: 'rgba(188,140,255,.1)',
        borderWidth: 2, tension: 0.4, fill: true, pointRadius: 0,
      },
      {
        label: '累计提升 %', data: Array(MAX_POINTS).fill(null),
        borderColor: '#3fb950', backgroundColor: 'rgba(63,185,80,.08)',
        borderWidth: 1.5, tension: 0.4, fill: false, pointRadius: 0,
        yAxisID: 'y2',
      }
    ]
  },
  options: {
    animation: false,
    responsive: true, maintainAspectRatio: false,
    scales: {
      x: { display: false },
      y:  { min:0, max:1, grid:{ color:'#21262d' }, ticks:{ callback: v=>(v*100).toFixed(0)+'%' } },
      y2: { position:'right', min:0, grid:{ display:false }, ticks:{ callback: v=>v+'%' } }
    },
    plugins: { legend: { position:'top', labels:{ boxWidth:12, padding:12 } } }
  }
});

// Strategy Doughnut Chart
const stratData = { EI:0, UCB:0, PI:0, Other:0 };
const stratChart = new Chart($('stratChart'), {
  type: 'doughnut',
  data: {
    labels: ['EI','UCB','PI','Other'],
    datasets: [{
      data: [1,1,1,1],
      backgroundColor: ['#58a6ff','#3fb950','#ffa657','#bc8cff'],
      borderColor: '#161b22', borderWidth: 3, hoverOffset: 6,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    cutout: '68%',
    plugins: {
      legend: { position:'bottom', labels:{ boxWidth:12, padding:10 } }
    }
  }
});

// ─── State ───────────────────────────────────────────────────
let allLogs = [];
let logCount = 0;

// ─── Render Functions ─────────────────────────────────────────

function renderStats(metrics, tasks, status) {
  const last = metrics[metrics.length - 1];
  if (!last) return;

  $('s-active').textContent  = last.active;
  $('s-completed').textContent = last.completed;
  $('s-learning').textContent  = (last.learning * 100).toFixed(0) + '%';
  $('s-improvement').textContent = last.improvement.toFixed(1) + '%';
  $('s-cpu').textContent  = last.cpu + '%';
  $('s-mem').textContent  = last.mem + '%';
  $('cpu-live').textContent = `CPU ${last.cpu}%`;
  $('score-live').textContent = `学习 ${(last.learning*100).toFixed(0)}%`;

  // Update resource chart
  resChart.data.datasets[0].data.push(last.cpu);
  resChart.data.datasets[1].data.push(last.mem);
  resChart.data.labels.push('');
  if (resChart.data.datasets[0].data.length > MAX_POINTS) {
    resChart.data.datasets[0].data.shift();
    resChart.data.datasets[1].data.shift();
    resChart.data.labels.shift();
  }
  resChart.update('none');

  // Update score chart
  scoreChart.data.datasets[0].data.push(last.learning);
  scoreChart.data.datasets[1].data.push(last.improvement);
  scoreChart.data.labels.push('');
  if (scoreChart.data.datasets[0].data.length > MAX_POINTS) {
    scoreChart.data.datasets[0].data.shift();
    scoreChart.data.datasets[1].data.shift();
    scoreChart.data.labels.shift();
  }
  scoreChart.update('none');
}

function renderTasks(tasks) {
  $('task-count').textContent = tasks.length;
  const el = $('tasks-list');

  const statusOrder = {running:0, pending:1, completed:2, failed:3};
  const sorted = [...tasks].sort((a,b) => (statusOrder[a.status]||9) - (statusOrder[b.status]||9));

  el.innerHTML = sorted.map(t => {
    const pct = Math.min(100, Math.max(0, t.progress)).toFixed(0);
    const isDone = t.status === 'completed';
    return `
    <div class="task-item">
      <div class="task-header">
        <span class="task-name">${t.name}</span>
        <span class="task-strategy">${t.strategy}</span>
        <span class="status-badge status-${t.status}">${statusLabel(t.status)}</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill ${isDone?'done':''}" style="width:${pct}%"></div>
      </div>
      <div class="task-meta">
        <span>进度 <b>${pct}%</b></span>
        <span>迭代 <b>${t.iterations}/${t.max_iterations}</b></span>
        <span>最佳 <b>${fmtScore(t.best_score)}</b></span>
        ${t.start_time ? `<span>开始 <b>${t.start_time.slice(11)}</b></span>` : ''}
      </div>
    </div>`;
  }).join('');

  // Update strategy chart
  const counts = {EI:0,UCB:0,PI:0,Other:0};
  tasks.forEach(t => {
    if (t.strategy in counts) counts[t.strategy]++;
    else counts.Other++;
  });
  stratChart.data.datasets[0].data = [counts.EI, counts.UCB, counts.PI, counts.Other];
  stratChart.update('none');
}

function statusLabel(s) {
  return {running:'运行中', pending:'等待', completed:'已完成', failed:'失败'}[s] || s;
}

function renderLogs(tasks) {
  // 收集所有任务的日志行
  const stream = $('log-stream');
  const entries = [];
  tasks.forEach(t => {
    (t.log||[]).forEach(line => {
      entries.push({ task: t.name, line, status: t.status });
    });
  });

  // 去重：基于内容
  const key = entries.map(e => e.line).join('|');
  if (key === window._lastLogKey) return;
  window._lastLogKey = key;

  const html = entries.slice(-80).map(e => {
    let cls = 'log-iter';
    if (e.line.includes('任务启动')) cls = 'log-start';
    else if (e.line.includes('任务完成')) cls = 'log-done';
    return `<div class="log-entry ${cls}">[${e.task}] ${e.line}</div>`;
  }).join('');

  stream.innerHTML = html;
  stream.scrollTop = stream.scrollHeight;
  $('log-count').textContent = entries.length + ' 条';
}

// ─── WebSocket ───────────────────────────────────────────────

let ws = null;
let wsRetry = 0;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${location.host}/ws`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    wsRetry = 0;
    $('conn-overlay').classList.add('hidden');
    $('engine-status').textContent = '引擎运行中';
  };

  ws.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'update') handleUpdate(data);
    } catch(err) {}
  };

  ws.onclose = () => {
    $('conn-overlay').classList.remove('hidden');
    $('conn-msg').textContent = `连接断开，${Math.min(wsRetry+1,10)}s 后重连...`;
    $('engine-status').textContent = '重连中';
    wsRetry++;
    setTimeout(connectWS, Math.min(wsRetry * 1000, 10000));
  };

  ws.onerror = () => ws.close();
}

function handleUpdate(data) {
  const { tasks, metrics, status } = data;
  if (metrics && metrics.length) renderStats(metrics, tasks, status);
  if (tasks && tasks.length) {
    renderTasks(tasks);
    renderLogs(tasks);
  }
}

// ─── Fallback: Polling if WS not available ───────────────────

function startPolling() {
  async function poll() {
    try {
      const r = await fetch('/api/snapshot');
      const data = await r.json();
      handleUpdate(data);
      $('conn-overlay').classList.add('hidden');
    } catch(e) {}
  }
  poll();
  setInterval(poll, 2000);
}

// ─── Boot ────────────────────────────────────────────────────

window._lastLogKey = '';
window.addEventListener('load', () => {
  // 先尝试 WebSocket，失败时回退到轮询
  try {
    connectWS();
  } catch(e) {
    startPolling();
  }
  // 也同时开启轮询作为保底（当 WS 断开时）
  setTimeout(() => {
    if (ws && ws.readyState !== WebSocket.OPEN) {
      startPolling();
    }
  }, 4000);
});
</script>
</body>
</html>
